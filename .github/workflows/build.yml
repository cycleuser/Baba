name: Build and Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          brew install cmake ninja
      
      - name: Build library
        run: |
          mkdir -p python/baba/lib python/baba/include
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DBABA_BUILD_EXAMPLES=OFF -DBABA_BUILD_TESTS=OFF
          cmake --build build
          cp build/libbaba.a python/baba/lib/libbaba_macos.a
          cp src/baba.h python/baba/include/
          cp src/platform/platform.h python/baba/include/
      
      - name: Verify build
        run: |
          echo "=== macOS build ==="
          ls -la python/baba/lib/
          ls -la python/baba/include/
      
      - uses: actions/upload-artifact@v4
        with:
          name: lib-macos
          path: python/baba/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build libx11-dev
      
      - name: Build library
        run: |
          mkdir -p python/baba/lib python/baba/include
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DBABA_BUILD_EXAMPLES=OFF -DBABA_BUILD_TESTS=OFF
          cmake --build build
          cp build/libbaba.a python/baba/lib/libbaba_linux.a
          cp src/baba.h python/baba/include/
          cp src/platform/platform.h python/baba/include/
      
      - name: Verify build
        run: |
          echo "=== Linux build ==="
          ls -la python/baba/lib/
          ls -la python/baba/include/
      
      - uses: actions/upload-artifact@v4
        with:
          name: lib-linux
          path: python/baba/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja
      
      - name: Build library
        shell: msys2 {0}
        run: |
          mkdir -p python/baba/lib python/baba/include
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DBABA_BUILD_EXAMPLES=OFF -DBABA_BUILD_TESTS=OFF
          cmake --build build
          cp build/libbaba.a python/baba/lib/libbaba_windows.a
          cp src/baba.h python/baba/include/
          cp src/platform/platform.h python/baba/include/
      
      - name: Verify build
        shell: msys2 {0}
        run: |
          echo "=== Windows build ==="
          ls -la python/baba/lib/
          ls -la python/baba/include/
      
      - uses: actions/upload-artifact@v4
        with:
          name: lib-windows
          path: python/baba/

  publish:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: lib-*
          merge-multiple: false
      
      - name: Merge libraries into package
        run: |
          set -x
          mkdir -p python/baba/lib python/baba/include
          
          echo "=== Downloaded artifacts ==="
          ls -la artifacts/
          
          echo "=== macOS files ==="
          ls -la artifacts/lib-macos/lib/ 2>/dev/null || echo "No macOS lib"
          
          echo "=== Linux files ==="
          ls -la artifacts/lib-linux/lib/ 2>/dev/null || echo "No Linux lib"
          
          echo "=== Windows files ==="
          ls -la artifacts/lib-windows/lib/ 2>/dev/null || echo "No Windows lib"
          
          # Copy all library files
          cp artifacts/lib-macos/lib/*.a python/baba/lib/ 2>/dev/null || true
          cp artifacts/lib-linux/lib/*.a python/baba/lib/ 2>/dev/null || true
          cp artifacts/lib-windows/lib/*.a python/baba/lib/ 2>/dev/null || true
          
          # Copy headers (from any platform, they're the same)
          cp -r artifacts/lib-macos/include/* python/baba/include/ 2>/dev/null || true
          
          echo "=== Final package contents ==="
          echo "Libraries:"
          ls -la python/baba/lib/
          echo "Headers:"
          ls -la python/baba/include/
          
          # Verify we have all platforms
          MISSING=""
          [ -f python/baba/lib/libbaba_macos.a ] || MISSING="$MISSING macos"
          [ -f python/baba/lib/libbaba_linux.a ] || MISSING="$MISSING linux"
          [ -f python/baba/lib/libbaba_windows.a ] || MISSING="$MISSING windows"
          
          if [ -n "$MISSING" ]; then
            echo "WARNING: Missing libraries for:$MISSING"
          fi
      
      - name: Build Python package
        run: |
          pip install build twine
          python -m build
      
      - name: Check package contents
        run: |
          echo "=== Wheel contents ==="
          unzip -l dist/*.whl | grep -E "(lib|include)" || echo "No lib/include in wheel"
      
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*

  # Test build without publishing
  test-wheel:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: lib-*
          merge-multiple: false
      
      - name: Merge and build
        run: |
          mkdir -p python/baba/lib python/baba/include
          cp artifacts/lib-macos/lib/*.a python/baba/lib/ 2>/dev/null || true
          cp artifacts/lib-linux/lib/*.a python/baba/lib/ 2>/dev/null || true
          cp artifacts/lib-windows/lib/*.a python/baba/lib/ 2>/dev/null || true
          cp -r artifacts/lib-macos/include/* python/baba/include/ 2>/dev/null || true
          
          echo "=== Package contents ==="
          ls -la python/baba/lib/
          
          pip install build
          python -m build --wheel
      
      - uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl